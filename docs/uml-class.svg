<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="SF Mono, Courier, monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <style>
      text { fill: #e0e0e0; font-size: 12px; }
      .title { font-size: 22px; font-weight: bold; fill: #00d4aa; }
      .subtitle { font-size: 14px; fill: #8888aa; }
      .box { fill: none; stroke: #333355; stroke-width: 1.5; rx: 8; ry: 8; }
      .box-naive { fill: rgba(233,69,96,0.08); stroke: #e94560; stroke-width: 2; rx: 8; ry: 8; }
      .box-resilient { fill: rgba(139,92,246,0.08); stroke: #8b5cf6; stroke-width: 2; rx: 8; ry: 8; }
      .box-domain { fill: rgba(0,212,170,0.06); stroke: #00d4aa; stroke-width: 2; rx: 8; ry: 8; }
      .arrow { stroke: #555577; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-red { stroke: #e94560; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-red); }
      .meth { font-size: 10px; fill: #8888aa; }
      .tag { font-size: 9px; }
      .tag-naive { fill: #e94560; }
      .tag-resilient { fill: #8b5cf6; }
      .badge { font-size: 10px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555577"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e94560"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <text x="30" y="35" class="title">📐 UML Class Diagram — Customer Support Verification Guard</text>
  <text x="30" y="55" class="subtitle">Static Module Structure &amp; Duck-Typed Subagent Interface</text>

  <!-- Domain Entity: Customer -->
  <rect x="30" y="80" width="180" height="130" class="box-domain"/>
  <text x="45" y="100" style="fill:#00d4aa;font-weight:bold;font-size:13px;">🧑‍💼 Customer</text>
  <line x1="30" y1="110" x2="210" y2="110" stroke="#00d4aa" stroke-width="1"/>
  <text x="42" y="128" class="meth">+ id: string</text>
  <text x="42" y="144" class="meth">+ name: string</text>
  <text x="42" y="160" class="meth">+ email: string</text>
  <text x="42" y="176" class="meth">+ tier: string</text>
  <text x="42" y="195" style="fill:#8888aa;font-size:10px;">findCustomerByName(name)</text>

  <!-- Domain Entity: Order -->
  <rect x="250" y="80" width="190" height="130" class="box-domain"/>
  <text x="265" y="100" style="fill:#00d4aa;font-weight:bold;font-size:13px;">📦 Order</text>
  <line x1="250" y1="110" x2="440" y2="110" stroke="#00d4aa" stroke-width="1"/>
  <text x="262" y="128" class="meth">+ id: string</text>
  <text x="262" y="144" class="meth">+ customerId: string</text>
  <text x="262" y="160" class="meth">+ amount: number</text>
  <text x="262" y="176" class="meth">+ item: string</text>
  <text x="262" y="195" style="fill:#8888aa;font-size:10px;">findOrderById(id)</text>

  <!-- Domain Entity: Refund -->
  <rect x="480" y="80" width="180" height="130" class="box-domain"/>
  <text x="495" y="100" style="fill:#00d4aa;font-weight:bold;font-size:13px;">💸 Refund</text>
  <line x1="480" y1="110" x2="660" y2="110" stroke="#00d4aa" stroke-width="1"/>
  <text x="492" y="128" class="meth">+ orderId: string</text>
  <text x="492" y="144" class="meth">+ amount: number</text>
  <text x="492" y="160" class="meth">+ targetCustomerId</text>
  <text x="492" y="176" class="meth">+ processed: bool</text>
  <text x="492" y="195" class="meth">+ success: bool|null</text>

  <!-- Arrow: Customer → Order -->
  <path d="M 210 145 L 248 145" class="arrow"/>
  <text x="216" y="138" style="font-size:8px;fill:#555577;">1:N</text>

  <!-- Arrow: Order → Refund -->
  <path d="M 440 145 L 478 145" class="arrow"/>
  <text x="448" y="138" style="font-size:8px;fill:#555577;">1:1</text>

  <!-- Infrastructure -->
  <rect x="30" y="240" width="300" height="150" class="box"/>
  <text x="45" y="260" style="fill:#f59e0b;font-weight:bold;font-size:13px;">⚙ infrastructure.js</text>
  <line x1="30" y1="268" x2="330" y2="268" stroke="#f59e0b" stroke-width="1"/>
  <text x="42" y="286" class="meth">async get_customer(name) → Customer</text>
  <text x="42" y="304" class="meth">async lookup_order(id, customerId)</text>
  <text x="42" y="322" class="meth">async process_refund(id, amt, cid)</text>
  <text x="42" y="344" class="meth">❌ VerificationRequiredError</text>
  <text x="42" y="362" class="meth">❌ InvalidAccountError</text>
  <text x="42" y="380" class="meth">❌ CustomerNotFoundError</text>

  <!-- Duck-Typed Interface -->
  <rect x="380" y="245" width="220" height="60" fill="none" stroke="#555577" stroke-dasharray="6,3" rx="6"/>
  <text x="400" y="268" style="fill:#00d4aa;font-size:11px;">«interface» handleRequest</text>
  <text x="400" y="288" style="fill:#8888aa;font-size:9px;">async ({customerName, orderId,</text>
  <text x="400" y="300" style="fill:#8888aa;font-size:9px;">withCustomerId}) → Result</text>

  <!-- Naive Subagent -->
  <rect x="30" y="420" width="280" height="150" class="box-naive"/>
  <text x="45" y="440" class="tag tag-naive" style="font-size:12px;">❌ subagent-naive.js</text>
  <line x1="30" y1="450" x2="310" y2="450" stroke="#e94560" stroke-width="1"/>
  <text x="42" y="470" class="meth" style="fill:#e94560;">MODE: "naive"</text>
  <text x="42" y="488" class="meth">• Skips get_customer ~12%</text>
  <text x="42" y="506" class="meth">• Calls lookup_order by name</text>
  <text x="42" y="524" class="meth">• No programmatic guard</text>
  <text x="42" y="545" class="meth" style="fill:#e94560;">⚠️ Misidentifies accounts</text>

  <!-- Resilient Subagent -->
  <rect x="360" y="420" width="290" height="150" class="box-resilient"/>
  <text x="375" y="440" class="tag tag-resilient" style="font-size:12px;">✅ subagent-resilient.js</text>
  <line x1="360" y1="450" x2="650" y2="450" stroke="#8b5cf6" stroke-width="1"/>
  <text x="372" y="470" class="meth" style="fill:#8b5cf6;">MODE: "resilient"</text>
  <text x="372" y="488" class="meth">• Always calls get_customer</text>
  <text x="372" y="506" class="meth">• if(!customerId) throw Error</text>
  <text x="372" y="524" class="meth">• Programmatic prerequisite</text>
  <text x="372" y="545" class="meth" style="fill:#8b5cf6;">✅ Zero misidentifications</text>

  <!-- Coordinator -->
  <rect x="700" y="420" width="180" height="120" class="box"/>
  <text x="715" y="440" style="fill:#00d4aa;font-weight:bold;font-size:12px;">🔧 coordinator.js</text>
  <line x1="700" y1="450" x2="880" y2="450" stroke="#00d4aa" stroke-width="1"/>
  <text x="712" y="468" class="meth">async runScenario(</text>
  <text x="712" y="486" class="meth">subagent, label)</text>
  <text x="712" y="504" class="meth">→ {results, metrics}</text>
  <text x="712" y="528" class="meth">Duck-typed: calls</text>
  <text x="712" y="544" class="meth">handleRequest(item)</text>

  <!-- Implementation arrows -->
  <path d="M 170 270 L 280 305" class="arrow"/>
  <text x="185" y="290" style="font-size:8px;fill:#555577;">uses</text>

  <path d="M 410 305 L 170 430" class="arrow"/>
  <path d="M 500 305 L 500 418" class="arrow"/>

  <rect x="700" y="80" width="180" height="80" class="box"/>
  <text x="715" y="102" style="fill:#00d4aa;font-weight:bold;font-size:12px;">📋 demo.js</text>
  <line x1="700" y1="110" x2="880" y2="110" stroke="#00d4aa" stroke-width="1"/>
  <text x="712" y="128" class="meth">Executes both scenarios</text>
  <text x="712" y="146" class="meth">Prints ASCII tables</text>

  <text x="700" y="580" style="fill:#555577;font-size:9px;">🤖 Generated by DeepSeek V4 Pro</text>
</svg>
