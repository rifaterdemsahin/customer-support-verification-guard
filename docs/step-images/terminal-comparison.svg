<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" font-family="SF Mono, Courier, monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="250" fill="url(#bgGrad)"/>

  <!-- Naive terminal -->
  <rect x="20" y="20" width="370" height="210" fill="#0d0d1a" stroke="#e94560" rx="6"/>
  <text x="35" y="45" style="fill:#e94560;font-size:13px;font-weight:bold;">❌ NAIVE — Terminal Output</text>
  <text x="35" y="70" style="fill:#8888aa;font-size:11px;font-family:SF Mono,monospace;">$ agent process --order ORD-102 --customer "Bob Smith"</text>
  <text x="35" y="90" style="fill:#e94560;font-size:11px;font-family:SF Mono,monospace;">[WARN] get_customer skipped — no customer ID</text>
  <text x="35" y="110" style="fill:#8888aa;font-size:11px;font-family:SF Mono,monospace;">lookup_order(ORD-102, null) → Order found: $129.50</text>
  <text x="35" y="130" style="fill:#e94560;font-size:11px;font-family:SF Mono,monospace;">process_refund(ORD-102, $129.50, null)</text>
  <text x="35" y="150" style="fill:#e94560;font-size:11px;font-family:SF Mono,monospace;">⚠️  Refund processed on WRONG account (customer ID null)</text>
  <text x="35" y="175" style="fill:#e94560;font-size:12px;font-weight:bold;">❌ MISIDENTIFIED — Alice's refund → Bob's account</text>
  <text x="35" y="200" style="fill:#8888aa;font-size:10px;">⏱  Latency: 180ms | 💸 Tokens: 420 | 🔧 Interventions: 1</text>

  <!-- Resilient terminal -->
  <rect x="410" y="20" width="370" height="210" fill="#0d0d1a" stroke="#00d4aa" rx="6"/>
  <text x="425" y="45" style="fill:#00d4aa;font-size:13px;font-weight:bold;">✅ RESILIENT — Terminal Output</text>
  <text x="425" y="70" style="fill:#8888aa;font-size:11px;font-family:SF Mono,monospace;">$ agent process --order ORD-102 --customer "Bob Smith"</text>
  <text x="425" y="90" style="fill:#00d4aa;font-size:11px;font-family:SF Mono,monospace;">🔒 get_customer("Bob Smith") → ID: C002, tier: free</text>
  <text x="425" y="110" style="fill:#00d4aa;font-size:11px;font-family:SF Mono,monospace;">🔑 Guard: customerId = C002 ✓ verified</text>
  <text x="425" y="130" style="fill:#8888aa;font-size:11px;font-family:SF Mono,monospace;">lookup_order(ORD-102, C002) → Order found: $129.50</text>
  <text x="425" y="150" style="fill:#8888aa;font-size:11px;font-family:SF Mono,monospace;">process_refund(ORD-102, $129.50, C002)</text>
  <text x="425" y="175" style="fill:#00d4aa;font-size:12px;font-weight:bold;">✅ CORRECT REFUND — Bob Smith (C002) credited</text>
  <text x="425" y="200" style="fill:#8888aa;font-size:10px;">⏱  Latency: 165ms | 💸 Tokens: 280 | 🔧 Interventions: 0</text>
</svg>
