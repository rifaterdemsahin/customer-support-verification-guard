<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="SF Mono, Courier, monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <style>
      text { fill: #e0e0e0; font-size: 13px; }
      .title { font-size: 22px; font-weight: bold; fill: #f59e0b; }
    </style>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <text x="30" y="40" class="title">📊 Act 3: Comparative Metrics — Naive vs Resilient</text>

  <!-- Table -->
  <rect x="30" y="70" width="740" height="280" class="bgBox"/>
  <line x1="30" y1="100" x2="770" y2="100" stroke="#333355" stroke-width="1"/>

  <text x="50" y="93" style="fill:#f59e0b;font-weight:bold;font-size:14px;">Metric</text>
  <text x="250" y="93" style="fill:#e94560;font-weight:bold;font-size:14px;">❌ Naive</text>
  <text x="450" y="93" style="fill:#00d4aa;font-weight:bold;font-size:14px;">✅ Resilient</text>
  <text x="650" y="93" style="fill:#8b5cf6;font-weight:bold;font-size:14px;">🎯 Impact</text>

  <text x="50" y="128">📋 Total Requests</text><text x="250" y="128">25</text><text x="450" y="128">25</text><text x="650" y="128">Same workload</text>
  <text x="50" y="155">✅ Success</text><text x="250" y="155" style="fill:#e94560;">22 (88%)</text><text x="450" y="155" style="fill:#00d4aa;">25 (100%)</text><text x="650" y="155" style="fill:#00d4aa;">+12% success</text>
  <text x="50" y="182">⚠️ Misidentified</text><text x="250" y="182" style="fill:#e94560;">3 (12%)</text><text x="450" y="182" style="fill:#00d4aa;">0 (0%)</text><text x="650" y="182" style="fill:#00d4aa;">100% eliminated</text>
  <text x="50" y="209">🛡️ Blocked</text><text x="250" y="209" style="fill:#e94560;">0</text><text x="450" y="209" style="fill:#00d4aa;">3</text><text x="650" y="209" style="fill:#8b5cf6;">Prevented 3 incidents</text>
  <text x="50" y="236">💸 Token Cost</text><text x="250" y="236" style="fill:#e94560;">10,500</text><text x="450" y="236" style="fill:#00d4aa;">7,000</text><text x="650" y="236" style="fill:#00d4aa;">-3,500 (38%)</text>
  <text x="50" y="263">🔧 Interventions</text><text x="250" y="263" style="fill:#e94560;">3</text><text x="450" y="263" style="fill:#00d4aa;">1</text><text x="650" y="263" style="fill:#00d4aa;">-67% overhead</text>
  <text x="50" y="290">⏱ Avg Latency</text><text x="250" y="290" style="fill:#e94560;">~250ms</text><text x="450" y="290" style="fill:#00d4aa;">~235ms</text><text x="650" y="290" style="fill:#00d4aa;">Faster (fewer retries)</text>
  <text x="50" y="317">💡 Pattern</text><text x="250" y="317" style="fill:#e94560;">Prompt-based</text><text x="450" y="317" style="fill:#00d4aa;">Programmatic</text><text x="650" y="317" style="fill:#8b5cf6;">Architecture wins</text>

  <rect x="30" y="370" width="740" height="115" fill="none" stroke="#00d4aa" stroke-width="2" rx="8"/>
  <text x="50" y="398" style="fill:#00d4aa;font-weight:bold;font-size:16px;">🎯 VERDICT</text>
  <text x="50" y="425" style="font-size:13px;">Programmatic prerequisites eliminate the 12% failure class entirely.</text>
  <text x="50" y="450" style="font-size:13px;">Token consumption reduced by 38%. Zero destructive actions leak through.</text>
  <text x="50" y="475" style="fill:#00d4aa;font-size:12px;">⚡ Architecture > Prompt Engineering for enterprise reliability</text>
